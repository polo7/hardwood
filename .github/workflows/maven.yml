name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Check for legacy JavaDoc comments'
        run: |
          if grep -rn '^\s*/\*\*' --include='*.java' .; then
            echo "::error::Found legacy /** */ JavaDoc comments. Use /// Markdown syntax (JEP 467) instead."
            exit 1
          fi

      - name: 'Build and install modules'
        run: ./mvnw -B clean install

      - name: 'Upload built artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/
          retention-days: 1

  javadoc:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Generate Javadoc'
        run: ./mvnw -B javadoc:javadoc

  integration-tests:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - java: '21'
            install_libdeflate: false
            enable_incubating: false
            name: 'Java 21'
          - java: '25'
            install_libdeflate: true
            enable_incubating: false
            name: 'Java 25'
          - java: '25'
            install_libdeflate: true
            enable_incubating: true
            name: 'Java 25 (incubating)'

    name: Integration Tests - ${{ matrix.name }}

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Install libdeflate'
        if: ${{ matrix.install_libdeflate }}
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Run integration tests (Java 21)'
        if: ${{ !matrix.install_libdeflate && !matrix.enable_incubating }}
        run: ./mvnw -B verify -pl :hardwood-integration-test

      - name: 'Run integration tests (with libdeflate)'
        if: ${{ matrix.install_libdeflate && !matrix.enable_incubating }}
        run: ./mvnw -B verify -pl :hardwood-integration-test -Dlibdeflate.required=true -DargLine="--enable-native-access=ALL-UNNAMED"

      - name: 'Run integration tests (with incubating APIs)'
        if: ${{ matrix.install_libdeflate && matrix.enable_incubating }}
        run: ./mvnw -B verify -pl :hardwood-integration-test -Dlibdeflate.required=true -DargLine="--enable-native-access=ALL-UNNAMED --add-modules jdk.incubator.vector"

  api-change-report:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Generate API change report'
        run: |
          JAPICMP_OLD_VERSION="$(sed -n 's/^Latest version: \([^,]*\),.*/\1/p' README.md)"
          echo "Comparing against ${JAPICMP_OLD_VERSION}"
          ./mvnw -ntp -B package japicmp:cmp -pl :hardwood-core -DskipTests -Djapicmp.oldVersion="${JAPICMP_OLD_VERSION}"

      - name: 'Upload API change report'
        uses: actions/upload-artifact@v6
        with:
          name: japicmp-report
          path: core/target/japicmp/

  performance-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Cache taxi data'
        uses: actions/cache@v4
        with:
          path: performance-testing/test-data-setup/target/tlc-trip-record-data/
          key: taxi-data-2023-01-to-2025-12

      - name: 'Run performance tests (with SIMD)'
        run: ./mvnw -B verify -Pperformance-test -pl :hardwood-performance-testing -amd -Dperf.start=2023-01 -Dperf.end=2025-12
        env:
          MAVEN_OPTS: '--add-modules jdk.incubator.vector'

  # Verify the native CLI build on PRs (Linux only, no release)
  native-build-check:
    if: github.event_name == 'pull_request'
    needs: build
    name: 'Verify native CLI build'
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: 'Set up Graal'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Build Native Image'
        run: ./mvnw -ntp -B -Dnative package -pl cli -DskipTests

  # Build native CLI executable per runner and publish as early-access release
  package:
    if: github.event_name == 'push'
    needs: build
    name: 'Build native CLI on ${{ matrix.os }}'
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, macos-26-intel, macos-26, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: 'Add Developer Command Prompt for Microsoft Visual C++'
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: 'Set up Graal'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: 'Download built artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/dev/hardwood/

      - name: 'Build Native Image'
        run: ./mvnw -ntp -B -Dnative package -pl cli -DskipTests

      - name: 'Upload build artifact (tar.gz)'
        if: ${{ runner.os != 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.tar.gz

      - name: 'Upload build artifact (zip)'
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.zip

  early-access:
    if: github.event_name == 'push'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Download all build artifacts'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: 'List artifacts'
        run: ls -la artifacts/

      - name: 'Create or update early-access release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete 1.0-early-access --yes || true
          git tag -f 1.0-early-access
          git push -f origin 1.0-early-access
          gh release create 1.0-early-access \
            --title "1.0-early-access" \
            --notes "Early-access build of the \`hardwood\` CLI, updated on every push to \`main\`.

          > **Warning**: This is a pre-release build and may be unstable.

          **Platforms:**
          - Linux x86_64
          - macOS x86_64 (Intel)
          - macOS aarch64 (Apple Silicon)
          - Windows x86_64" \
            --prerelease \
            artifacts/*
